<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0">
<title>CareerPT - 비밀번호 재설정</title>
<link href="https://cdn.jsdelivr.net/gh/orioncactus/pretendard@v1.3.9/dist/web/static/pretendard.min.css" rel="stylesheet">
<script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2/dist/umd/supabase.js"></script>
<script src="../config.js"></script>
<style>
:root {
  --bg: #F7F7F5;
  --surface: #FFFFFF;
  --surface2: #F0F0EC;
  --border: #E4E4DF;
  --text-primary: #1A1A18;
  --text-secondary: #6B6B65;
  --text-muted: #A8A8A0;
  --accent: #2D5BFF;
  --accent-light: #EEF2FF;
  --green: #16A34A;
  --green-light: #DCFCE7;
  --red: #DC2626;
  --red-light: #FEE2E2;
  --radius: 12px;
  --radius-sm: 8px;
  --font: 'Pretendard',-apple-system,sans-serif;
}

*{box-sizing:border-box;margin:0;padding:0;-webkit-tap-highlight-color:transparent}
body{font-family:var(--font);background:var(--bg);color:var(--text-primary);min-height:100vh;display:flex;justify-content:center;}
::-webkit-scrollbar{width:0}

.phone{width:390px;min-height:100vh;background:var(--surface);display:flex;flex-direction:column;}

.auth-header{padding:60px 24px 36px}
.auth-logo{width:48px;height:48px;border-radius:14px;background:var(--accent);display:flex;align-items:center;justify-content:center;margin-bottom:24px;}
.auth-logo svg{width:26px;height:26px}
.auth-title{font-size:26px;font-weight:700;letter-spacing:-.5px;margin-bottom:6px}
.auth-sub{font-size:14px;color:var(--text-secondary);line-height:1.6}

.auth-body{flex:1;padding:0 24px 40px}

.field-row{margin-bottom:14px}
.field-label{font-size:12px;font-weight:500;color:var(--text-secondary);margin-bottom:6px}
.field-input{
  width:100%;font-size:14px;padding:12px 14px;
  border-radius:var(--radius-sm);border:1.5px solid var(--border);
  background:var(--surface);color:var(--text-primary);
  outline:none;font-family:var(--font);transition:border-color .15s;
}
.field-input:focus{border-color:var(--accent);box-shadow:0 0 0 3px rgba(45,91,255,.1)}
.field-input::placeholder{color:var(--text-muted)}

.auth-btn{
  width:100%;padding:14px;margin-top:6px;
  background:var(--accent);color:#fff;
  border:none;border-radius:var(--radius);
  font-size:15px;font-weight:700;font-family:var(--font);
  cursor:pointer;transition:all .15s;
  box-shadow:0 4px 16px rgba(45,91,255,.3);
}
.auth-btn:active{opacity:.85}
.auth-btn:disabled{opacity:.5;cursor:not-allowed}
.auth-btn.green{background:var(--green);box-shadow:0 4px 16px rgba(22,163,74,.3)}

.error-msg{background:var(--red-light);border:1px solid rgba(220,38,38,.2);border-radius:var(--radius-sm);padding:10px 14px;font-size:13px;color:var(--red);margin-bottom:14px;display:none;}
.success-msg{background:var(--green-light);border:1px solid rgba(22,163,74,.2);border-radius:var(--radius-sm);padding:10px 14px;font-size:13px;color:var(--green);margin-bottom:14px;display:none;}

/* 잘못된 링크 화면 */
.invalid-wrap{display:flex;flex-direction:column;align-items:center;justify-content:center;flex:1;padding:24px;text-align:center;}
.invalid-icon{font-size:48px;margin-bottom:16px}
.invalid-title{font-size:18px;font-weight:700;margin-bottom:8px}
.invalid-sub{font-size:14px;color:var(--text-secondary);line-height:1.6;margin-bottom:24px}

/* 비밀번호 강도 표시 */
.pw-strength{margin-top:6px;display:flex;gap:4px}
.pw-bar{flex:1;height:3px;border-radius:2px;background:var(--border);transition:background .2s}
.pw-bar.weak{background:var(--red)}
.pw-bar.medium{background:#F59E0B}
.pw-bar.strong{background:var(--green)}
.pw-hint{font-size:11px;color:var(--text-muted);margin-top:5px}
</style>
</head>
<body>
<div class="phone">

  <div class="auth-header">
    <div class="auth-logo">
      <svg width="26" height="26" viewBox="0 0 24 24" fill="none" stroke="white" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
        <polyline points="22 12 18 12 15 21 9 3 6 12 2 12"/>
      </svg>
    </div>
    <div class="auth-title" id="page-title">새 비밀번호 설정</div>
    <div class="auth-sub" id="page-sub">새로 사용할 비밀번호를 입력해주세요.</div>
  </div>

  <!-- 정상 흐름: 비밀번호 입력 -->
  <div class="auth-body" id="reset-form">
    <div class="error-msg" id="reset-error"></div>
    <div class="success-msg" id="reset-success"></div>

    <div class="field-row">
      <div class="field-label">새 비밀번호</div>
      <input class="field-input" type="password" id="new-password" placeholder="8자 이상" oninput="checkStrength()">
      <div class="pw-strength">
        <div class="pw-bar" id="bar1"></div>
        <div class="pw-bar" id="bar2"></div>
        <div class="pw-bar" id="bar3"></div>
      </div>
      <div class="pw-hint" id="pw-hint">8자 이상 입력해주세요</div>
    </div>
    <div class="field-row">
      <div class="field-label">비밀번호 확인</div>
      <input class="field-input" type="password" id="confirm-password" placeholder="비밀번호 다시 입력">
    </div>

    <button class="auth-btn" id="reset-btn" onclick="handleReset()">비밀번호 변경하기</button>
  </div>

  <!-- 잘못된 링크 화면 -->
  <div class="invalid-wrap" id="invalid-screen" style="display:none">
    <div class="invalid-icon">🔗</div>
    <div class="invalid-title">링크가 유효하지 않아요</div>
    <div class="invalid-sub">재설정 링크가 만료되었거나<br>이미 사용된 링크예요.<br>다시 요청해주세요.</div>
    <button class="auth-btn" style="width:auto;padding:12px 28px" onclick="window.location.href='login.html'">
      로그인 화면으로 →
    </button>
  </div>

</div>

<script>
const { createClient } = supabase
const sb = createClient(SUPABASE_URL, SUPABASE_KEY)

// URL 해시에서 토큰 타입 확인
const hash = new URLSearchParams(window.location.hash.slice(1))
const type = hash.get('type')

if (type !== 'recovery') {
  document.getElementById('reset-form').style.display = 'none'
  document.getElementById('invalid-screen').style.display = 'flex'
}

function checkStrength() {
  const pw = document.getElementById('new-password').value
  const bars = [document.getElementById('bar1'), document.getElementById('bar2'), document.getElementById('bar3')]
  const hint = document.getElementById('pw-hint')

  bars.forEach(b => b.className = 'pw-bar')

  if (pw.length === 0) {
    hint.textContent = '8자 이상 입력해주세요'
  } else if (pw.length < 8) {
    bars[0].classList.add('weak')
    hint.textContent = '너무 짧아요'
  } else if (pw.length < 12 && !/[^a-zA-Z0-9]/.test(pw)) {
    bars[0].classList.add('medium')
    bars[1].classList.add('medium')
    hint.textContent = '보통 — 특수문자를 추가하면 더 안전해요'
  } else {
    bars.forEach(b => b.classList.add('strong'))
    hint.textContent = '안전한 비밀번호예요'
  }
}

async function handleReset() {
  const newPw = document.getElementById('new-password').value
  const confirmPw = document.getElementById('confirm-password').value
  const btn = document.getElementById('reset-btn')
  const errorEl = document.getElementById('reset-error')
  const successEl = document.getElementById('reset-success')

  errorEl.style.display = 'none'
  successEl.style.display = 'none'

  if (newPw.length < 8) {
    errorEl.textContent = '비밀번호는 8자 이상이어야 합니다.'
    errorEl.style.display = 'block'
    return
  }
  if (newPw !== confirmPw) {
    errorEl.textContent = '비밀번호가 일치하지 않아요.'
    errorEl.style.display = 'block'
    return
  }

  btn.disabled = true
  btn.textContent = '변경 중...'

  try {
    const { error } = await sb.auth.updateUser({ password: newPw })

    if (error) {
      errorEl.textContent = '변경에 실패했습니다. 링크가 만료되었을 수 있어요.'
      errorEl.style.display = 'block'
      btn.disabled = false
      btn.textContent = '비밀번호 변경하기'
    } else {
      btn.classList.add('green')
      btn.textContent = '✓ 변경 완료!'
      successEl.textContent = '비밀번호가 변경됐어요. 새 비밀번호로 로그인해주세요.'
      successEl.style.display = 'block'
      setTimeout(() => { window.location.href = 'login.html' }, 2000)
    }
  } catch (e) {
    errorEl.textContent = `오류: ${e.message}`
    errorEl.style.display = 'block'
    btn.disabled = false
    btn.textContent = '비밀번호 변경하기'
  }
}
</script>
</body>
</html>
