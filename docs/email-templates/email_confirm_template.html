<div style="font-family:-apple-system,BlinkMacSystemFont,'Segoe UI','Apple SD Gothic Neo','Pretendard',sans-serif;background:#F7F7F5;margin:0;padding:40px 16px;">
  <div style="max-width:480px;margin:0 auto;">

    <!-- 로고 영역 -->
    <div style="text-align:center;margin-bottom:32px;">
      <div style="display:inline-flex;align-items:center;justify-content:center;width:52px;height:52px;background:#2D5BFF;border-radius:14px;margin-bottom:12px;">
        <svg width="28" height="28" viewBox="0 0 24 24" fill="none" stroke="white" stroke-width="2.2" stroke-linecap="round" stroke-linejoin="round">
          <polyline points="22 12 18 12 15 21 9 3 6 12 2 12"/>
        </svg>
      </div>
      <div style="font-size:20px;font-weight:700;color:#1A1A18;letter-spacing:-.5px;">CareerPT</div>
    </div>

    <!-- 카드 -->
    <div style="background:#ffffff;border-radius:16px;padding:36px 32px;border:1px solid #E4E4DF;">

      <h1 style="font-size:22px;font-weight:700;color:#1A1A18;margin:0 0 8px;letter-spacing:-.5px;">
        이메일 인증을 완료해주세요
      </h1>
      <p style="font-size:15px;color:#6B6B65;line-height:1.7;margin:0 0 28px;">
        CareerPT에 가입해주셔서 감사해요.<br>
        아래 버튼을 눌러 이메일 인증을 완료하면<br>
        AI 커리어 코칭을 바로 시작할 수 있어요.
      </p>

      <!-- CTA 버튼 -->
      <div style="text-align:center;margin-bottom:28px;">
        <a href="{{ .ConfirmationURL }}"
           style="display:inline-block;background:#2D5BFF;color:#ffffff;font-size:15px;font-weight:700;padding:14px 36px;border-radius:12px;text-decoration:none;letter-spacing:-.2px;box-shadow:0 4px 16px rgba(45,91,255,.3);">
          이메일 인증하기
        </a>
      </div>

      <!-- 안내 -->
      <div style="background:#F0F0EC;border-radius:10px;padding:16px 18px;margin-bottom:24px;">
        <p style="font-size:13px;color:#6B6B65;line-height:1.7;margin:0;">
          버튼이 작동하지 않으면 아래 링크를 브라우저에 직접 붙여넣어 주세요.
        </p>
        <p style="font-size:12px;color:#A8A8A0;word-break:break-all;margin:6px 0 0;">
          {{ .ConfirmationURL }}
        </p>
      </div>

      <div style="border-top:1px solid #E4E4DF;padding-top:20px;">
        <p style="font-size:12px;color:#A8A8A0;line-height:1.7;margin:0;">
          이 링크는 <strong style="color:#6B6B65;">24시간</strong> 동안 유효해요.<br>
          본인이 가입하지 않으셨다면 이 메일을 무시해주세요.
        </p>
      </div>
    </div>

    <!-- 푸터 -->
    <div style="text-align:center;margin-top:24px;">
      <p style="font-size:12px;color:#A8A8A0;margin:0;">
        © 2025 CareerPT · 열정은 있지만 방향이 없는 당신을 위한 AI 커리어 코치
      </p>
    </div>

  </div>
</div>
